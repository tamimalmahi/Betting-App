{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>📋 Transaction History</h4>
        <a href="/dashboard" class="btn btn-primary btn-sm">Back to Dashboard</a>
    </div>

    {% if transactions %}
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                {% for row in transactions %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>
                        <span class="badge {% if row[0] == 'deposit' %}bg-success{% elif row[0] == 'withdraw' %}bg-danger{% else %}bg-primary{% endif %}">
                            {{ row[0] }}
                        </span>
                    </td>
                    <td>${{ row[1] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
        <p class="text-muted text-center">No transactions yet.</p>
    {% endif %}
</div>
{% endblock %}
