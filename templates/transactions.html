{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Admin Panel - Transactions</h4>
        <h5 class="text-success">System Total Balance: ${{ total_balance }}</h5>
    </div>
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[1] }}</td>
                    <td><span class="badge {% if row[2] == 'deposit' %}bg-success{% elif row[2] == 'withdraw' %}bg-danger{% else %}bg-primary{% endif %}">{{ row[2] }}</span></td>
                    <td>${{ row[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
