{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <div style="font-size: 60px;">👤</div>
            <h3 class="mt-2">{{ username }}</h3>
            <p class="text-muted">Member Account</p>
            <hr style="border-color: #334155;">
            <div class="balance-card">
                <h5>Current Balance</h5>
                <h2 class="fw-bold">${{ balance }}</h2>
            </div>
            <a href="/history" class="btn btn-primary w-100 mb-2">View Transaction History</a>
            <a href="/dashboard" class="btn btn-outline-secondary w-100">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
